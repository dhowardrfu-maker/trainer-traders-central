name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly re-scan to catch newly disclosed CVEs in pinned deps.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency audit (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # Fail only on high/critical so noisy transitive lows don't block PRs.
      - run: bunx --bun npm audit --audit-level=high

  supabase-migration-lint:
    name: Supabase migration lint (RLS / injection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/security/lint_migrations.py supabase/migrations

  codeql:
    name: CodeQL (JS/TS SAST)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
